<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>데이터 AI Readiness 자가진단 | PwC</title>
<script src="/vendor/react.production.min.js"></script>
<script src="/vendor/react-dom.production.min.js"></script>
<style>
  :root{
    --pwc-orange:#E0301E;       /* PwC primary red-orange */
    --pwc-orange-2:#EB8C00;     /* PwC amber */
    --pwc-rose:#D04A02;         /* deep orange */
    --ink:#2D2D2D; --sub:#5A6473; --line:#E3E3E3; --page:#F5F5F5; --card:#fff;
    --ok:#2E9E6B;
    --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--page);color:var(--ink);font-family:var(--font);line-height:1.55}
  .wrap{max-width:780px;margin:0 auto;padding:0 18px 80px}
  /* ---- PwC header ---- */
  .topbar{background:#fff;border-bottom:4px solid var(--pwc-orange);position:sticky;top:0;z-index:10}
  .topbar-inner{max-width:780px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:14px}
  .pwc-logo-img{height:42px;width:auto;display:block}
  .topbar-title{font-size:14px;color:var(--sub);border-left:1px solid var(--line);padding-left:14px}
  .topbar-title b{color:var(--ink);display:block;font-size:15px}

  .hero{background:linear-gradient(135deg,var(--pwc-rose),var(--pwc-orange) 60%,var(--pwc-orange-2));
        color:#fff;border-radius:16px;padding:30px 26px;margin-top:24px;box-shadow:0 8px 28px rgba(224,48,30,.18)}
  .hero h1{margin:0 0 8px;font-size:24px;font-weight:800;letter-spacing:-.5px}
  .hero p{margin:0;opacity:.95;font-size:14.5px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-top:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card h2{margin:0 0 4px;font-size:18px}
  .muted{color:var(--sub);font-size:13.5px;margin:0 0 16px}

  label.fld{display:block;margin-bottom:14px}
  label.fld .lab{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
  label.fld .req{color:var(--pwc-orange);margin-left:3px}
  input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:9px;font-size:14.5px;font-family:inherit;background:#fff;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pwc-orange)}
  textarea{min-height:90px;resize:vertical}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}

  .opt-card{border:1.5px solid var(--line);border-radius:11px;padding:14px 15px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;transition:.15s;background:#fff}
  .opt-card:hover{border-color:var(--pwc-orange-2)}
  .opt-card.sel{border-color:var(--pwc-orange);background:#FFF6F3;box-shadow:0 0 0 3px rgba(224,48,30,.08)}
  .opt-ico{font-size:24px;line-height:1}
  .opt-body b{display:block;font-size:15px}
  .opt-body span{font-size:13px;color:var(--sub)}

  .q-block{border-top:1px solid var(--line);padding:18px 0 4px}
  .q-block:first-child{border-top:none}
  .q-text{font-weight:700;font-size:15px;margin-bottom:12px}
  .q-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--pwc-rose);background:#FFF1EC;border-radius:6px;padding:2px 8px;margin-bottom:8px}
  .scale{display:flex;flex-direction:column;gap:8px}
  .scale .opt{border:1.5px solid var(--line);border-radius:9px;padding:10px 13px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;transition:.12s}
  .scale .opt:hover{border-color:var(--pwc-orange-2)}
  .scale .opt.sel{border-color:var(--pwc-orange);background:#FFF6F3;font-weight:600}
  .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:none}
  .opt.sel .dot{border-color:var(--pwc-orange);background:var(--pwc-orange);box-shadow:inset 0 0 0 3px #fff}

  .btn{background:var(--pwc-orange);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
  .btn:hover{background:#C42A1A}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:#fff;color:var(--pwc-orange);border:1.5px solid var(--pwc-orange)}
  .btn-row{display:flex;justify-content:space-between;gap:12px;margin-top:22px}

  .prog{height:7px;background:var(--line);border-radius:99px;overflow:hidden;margin:18px 0 4px}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--pwc-orange),var(--pwc-orange-2));transition:width .3s}
  .prog-lab{font-size:12px;color:var(--sub);text-align:right}

  /* result */
  .lvl-badge{display:inline-flex;align-items:baseline;gap:8px;background:#FFF6F3;border:1.5px solid var(--pwc-orange);border-radius:12px;padding:12px 18px}
  .lvl-badge b{font-size:30px;color:var(--pwc-orange)}
  .dimbar{margin:10px 0}
  .dimbar .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .dimbar .track{height:9px;background:var(--line);border-radius:99px;overflow:hidden}
  .dimbar .track>i{display:block;height:100%;background:var(--pwc-orange-2)}
  .report{font-size:14.5px;line-height:1.7}
  .report h2{font-size:17px;border-bottom:2px solid var(--pwc-orange);padding-bottom:5px;margin-top:24px}
  .report h3{font-size:15px;color:var(--pwc-rose);margin-top:18px}
  .report ul{padding-left:20px}
  .spin{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--pwc-orange);border-radius:50%;animation:s 1s linear infinite;margin:30px auto}
  @keyframes s{to{transform:rotate(360deg)}}
  .footer{text-align:center;color:var(--sub);font-size:12px;margin-top:40px}

  /* done screen */
  .done-screen{display:flex;justify-content:center;padding-top:60px}
  .done-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:48px 34px;text-align:center;max-width:480px;width:100%;box-shadow:0 8px 28px rgba(0,0,0,.06);animation:pop .35s ease}
  .done-check{width:78px;height:78px;border-radius:50%;background:linear-gradient(135deg,var(--pwc-rose),var(--pwc-orange));color:#fff;font-size:42px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 8px 22px rgba(224,48,30,.28)}
  .done-card h1{margin:0 0 12px;font-size:26px;font-weight:800;color:var(--ink)}
  .done-card p{margin:0;color:var(--sub);font-size:15px;line-height:1.7}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <img class="pwc-logo-img" src="/pwc-logo.png" alt="PwC" />
    <div class="topbar-title"><b>데이터 AI Readiness</b>자가진단</div>
  </div>
</div>
<div id="root"></div>
<script src="/static/index.js"></script>
</body>
</html>
