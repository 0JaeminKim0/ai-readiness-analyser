<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · AI Readiness 평가 | PwC</title>
<script src="/vendor/react.production.min.js"></script>
<script src="/vendor/react-dom.production.min.js"></script>
<style>
  :root{
    --pwc-orange:#E0301E;--pwc-orange-2:#EB8C00;--pwc-rose:#D04A02;
    --ink:#2D2D2D;--sub:#5A6473;--line:#E3E3E3;--page:#F5F5F5;--card:#fff;
    --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--page);color:var(--ink);font-family:var(--font);line-height:1.5}
  .topbar{background:#fff;border-bottom:4px solid var(--pwc-orange)}
  .topbar-inner{max-width:1200px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px}
  .pwc-logo-img{height:36px;width:auto;display:block}
  .topbar-title{font-size:14px;color:var(--sub);border-left:1px solid var(--line);padding-left:14px}
  .topbar-title b{color:var(--ink);display:block;font-size:15px}
  .layout{max-width:1200px;margin:20px auto;padding:0 20px;display:grid;grid-template-columns:380px 1fr;gap:20px}
  @media(max-width:900px){.layout{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  h2{font-size:16px;margin:0 0 12px}
  input,select,textarea,button{font-family:inherit}
  input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:8px;font-size:14px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pwc-orange)}
  textarea{min-height:70px;resize:vertical}
  .btn{background:var(--pwc-orange);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-weight:700;cursor:pointer;font-size:14px}
  .btn:hover{background:#C42A1A}
  .btn-sm{padding:6px 12px;font-size:13px}
  .ghost{background:#fff;color:var(--pwc-orange);border:1.5px solid var(--pwc-orange)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--sub);font-weight:700;font-size:12px}
  tr.item{cursor:pointer}
  tr.item:hover{background:#FFF6F3}
  tr.item.sel{background:#FFEDE8}
  .pill{display:inline-block;font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px}
  .p-submitted{background:#FFF1EC;color:var(--pwc-rose)}
  .p-reviewing{background:#FFF6D6;color:#9a7a00}
  .p-done{background:#E3F5EC;color:#2E9E6B}
  .lvl{display:inline-block;background:#FFF6F3;border:1.5px solid var(--pwc-orange);color:var(--pwc-orange);font-weight:800;border-radius:8px;padding:3px 10px}
  .field{margin-bottom:12px}
  .field .lab{font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:5px}
  .kv{display:grid;grid-template-columns:120px 1fr;gap:6px 10px;font-size:13.5px;margin-bottom:14px}
  .kv .k{color:var(--sub)}
  .report{font-size:13.5px;line-height:1.65;background:#FAFAFA;border:1px solid var(--line);border-radius:8px;padding:14px;max-height:380px;overflow:auto}
  .report h2{font-size:15px;border-bottom:2px solid var(--pwc-orange);padding-bottom:4px}
  .report h3{font-size:14px;color:var(--pwc-rose)}
  .dimbar{margin:7px 0}
  .dimbar .row{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px}
  .dimbar .track{height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .dimbar .track>i{display:block;height:100%;background:var(--pwc-orange-2)}
  .login{max-width:360px;margin:80px auto;text-align:center}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2E9E6B;color:#fff;padding:11px 20px;border-radius:8px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
  .qrow{font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .qrow .qq{color:var(--sub)}
  .qrow .qa{font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script src="/static/admin.js"></script>
</body>
</html>
